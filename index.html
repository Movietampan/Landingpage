<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disney+ UI Clone</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<div class="app-container">
    <header class="header">
        <img src="https://via.placeholder.com/40" alt="Profile" class="profile-pic">
        <img src="https://upload.wikimedia.org/wikipedia/commons/3/3e/Disney_plus_logo.svg" alt="Disney+" class="logo">
        <div class="download-icon"><i class="fa-solid fa-circle-arrow-down"></i></div>
    </header>

    <section class="hero-card">
        <div class="hero-content">
            <img src="https://images.alphacoders.com/113/1135406.jpg" alt="Luca" class="hero-img">
            <div class="play-btn-large"><i class="fa-solid fa-play"></i></div>
        </div>
    </section>

    <section class="section-container">
        <div class="section-header">
            <h3>Channel</h3>
            <span class="see-all">See all</span>
        </div>
        <div class="channel-grid">
            <div class="channel-card"><img src="https://upload.wikimedia.org/wikipedia/commons/d/de/Walt_Disney_Pictures_logo.svg" alt="Disney"></div>
            <div class="channel-card"><img src="https://upload.wikimedia.org/wikipedia/commons/d/d0/Pixar_Logo.svg" alt="Pixar"></div>
            <div class="channel-card marvel"><img src="https://upload.wikimedia.org/wikipedia/commons/b/b9/Marvel_Logo.svg" alt="Marvel"></div>
        </div>
    </section>

    <section class="section-container">
        <div class="section-header">
            <h3>New</h3>
            <span class="see-all">See all</span>
        </div>
        <div class="movie-list">
            <div class="movie-card">
                <div class="movie-thumb">
                    <img src="https://lumiere-a.akamaihd.net/v1/images/p_moana_20530_214ad4a3.jpeg" alt="Moana">
                </div>
                <div class="movie-info">
                    <h4>Moana</h4>
                    <div class="movie-meta">
                        <span>1h 43m</span>
                        <div class="play-btn-small"><i class="fa-solid fa-play"></i></div>
                        <span class="rating">9.5 <i class="fa-solid fa-star"></i></span>
                    </div>
                </div>
            </div>
            <div class="movie-card">
                <div class="movie-thumb">
                    <img src="https://lumiere-a.akamaihd.net/v1/images/p_encanto_homeent_22359_4892ae57.jpeg" alt="Encanto">
                </div>
                <div class="movie-info">
                    <h4>Encanto</h4>
                    <div class="movie-meta">
                        <span>1h 39m</span>
                        <div class="play-btn-small"><i class="fa-solid fa-play"></i></div>
                        <span class="rating">9.5 <i class="fa-solid fa-star"></i></span>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <nav class="bottom-nav">
        <i class="fa-solid fa-house active"></i>
        <i class="fa-solid fa-bookmark"></i>
        <div class="search-btn"><i class="fa-solid fa-magnifying-glass"></i></div>
        <i class="fa-solid fa-bell"></i>
        <i class="fa-solid fa-gear"></i>
    </nav>
</div>

</body>
</html>

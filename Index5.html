<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>MovieTampan - Streaming Koleksi Film</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #0a0f1c;
            color: #f0f3fa;
            line-height: 1.5;
        }

        /* Container utama dengan pendekatan flex column */
        .app-wrapper {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1.5rem 2rem;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        /* HEADER & judul site */
        .site-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            border-bottom: 2px solid #2a2f3f;
            padding-bottom: 0.75rem;
            gap: 1rem;
        }
        .logo-area h1 {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #FFD966, #FF8C42);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }
        .logo-area p {
            font-size: 0.85rem;
            color: #9aa4bf;
            margin-top: 4px;
        }
        .trend-badge {
            background: #1e2438;
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .trend-badge i {
            font-size: 1.2rem;
        }

        /* VIDEO PLAYER SECTION — sentral, dengan kontrol native */
        .hero-player {
            background: #05070e;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.6);
            transition: all 0.2s;
        }
        .video-container {
            width: 100%;
            background: #000;
        }
        video {
            width: 100%;
            display: block;
            aspect-ratio: 16 / 9;
            object-fit: cover;
            cursor: pointer;
        }
        /* custom styling kontrol native tetap rapi */
        video::-webkit-media-controls-panel {
            background: linear-gradient(to top, #0a0c16, transparent);
        }
        .player-caption {
            padding: 0.9rem 1.5rem 1.2rem 1.5rem;
            background: #0f1422;
            border-top: 1px solid #262c3c;
        }
        .player-caption h3 {
            font-size: 1.4rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .player-caption .now-badge {
            background: #ff5e6e;
            font-size: 0.7rem;
            padding: 4px 12px;
            border-radius: 30px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        .player-desc {
            margin-top: 10px;
            color: #b9c2dc;
            font-size: 0.9rem;
        }

        /* TRENDING LIST — flex box style utama */
        .trending-section {
            margin-top: 0.5rem;
        }
        .section-title {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            margin-bottom: 1.2rem;
            flex-wrap: wrap;
        }
        .section-title h2 {
            font-size: 1.7rem;
            font-weight: 700;
            background: linear-gradient(135deg, #EEF2FF, #C0CFEF);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .section-title span {
            font-size: 0.8rem;
            background: #1e253b;
            padding: 5px 12px;
            border-radius: 30px;
        }

        /* FLEXBOX GRID untuk list movie */
        .movies-flex-list {
            display: flex;
            flex-flow: row wrap;
            gap: 1.6rem;
            justify-content: flex-start;
            align-items: stretch;
        }

        /* kartu movie — pakai flex item dengan basis fleksibel */
        .movie-card {
            flex: 1 1 200px;
            min-width: 180px;
            max-width: 220px;
            background: #11161f;
            border-radius: 20px;
            overflow: hidden;
            transition: transform 0.25s ease, box-shadow 0.2s;
            cursor: pointer;
            border: 1px solid #252b3a;
            box-shadow: 0 5px 12px rgba(0,0,0,0.3);
        }
        .movie-card:hover {
            transform: translateY(-6px);
            border-color: #ffaa4a;
            box-shadow: 0 16px 24px -8px rgba(0,0,0,0.5);
        }
        .movie-thumb {
            background: #0c111b;
            height: 130px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            background-size: cover;
            background-position: center;
        }
        /* dummy ilustrasi background berbeda agar menarik */
        .thumb-placeholder {
            font-size: 2.5rem;
            font-weight: bold;
            opacity: 0.5;
            background: linear-gradient(145deg, #1f2a3e, #0b0f18);
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #f5b642;
        }
        .movie-info {
            padding: 0.9rem 1rem 1.1rem;
        }
        .movie-title {
            font-weight: 700;
            font-size: 1rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 6px;
        }
        .movie-duration {
            font-size: 0.75rem;
            color: #b5c0dd;
            background: #1f2638;
            display: inline-block;
            padding: 2px 10px;
            border-radius: 20px;
            margin-top: 6px;
        }
        .movie-desc {
            font-size: 0.7rem;
            color: #8f9bb3;
            margin-top: 8px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* RESPONSIVE dengan flexbox wrap */
        @media (max-width: 720px) {
            .app-wrapper {
                padding: 1rem;
            }
            .movies-flex-list {
                gap: 1rem;
                justify-content: center;
            }
            .movie-card {
                flex: 1 1 160px;
                min-width: 150px;
            }
            .section-title h2 {
                font-size: 1.4rem;
            }
            .player-caption h3 {
                font-size: 1.2rem;
            }
        }

        /* tombol extra style */
        .footer-note {
            margin-top: 2rem;
            text-align: center;
            font-size: 0.75rem;
            color: #5f6b8a;
            border-top: 1px solid #1e2438;
            padding-top: 1.5rem;
        }
        button {
            background: none;
            border: none;
            color: inherit;
        }
    </style>
</head>
<body>
<div class="app-wrapper">

    <!-- header dengan logo MovieTampan -->
    <div class="site-header">
        <div class="logo-area">
            <h1>MovieTampan</h1>
            <p>streaming keren · nonton gaya masa kini</p>
        </div>
        <div class="trend-badge">
            <span>🔥</span> TOP 10 Trending
        </div>
    </div>

    <!-- Video Player dengan kontrol penuh (HTML5 native) -->
    <div class="hero-player">
        <div class="video-container">
            <video id="mainPlayer" controls poster="https://placehold.co/1280x720/1a1f2e/f5b642?text=MovieTampan+Player" preload="metadata">
                <!-- contoh video sample dari domain publik / big buck bunny (sumber legal) 
                     sebagai demo player yang smooth, durasi dan kontrol bekerja sempurna -->
                <source src="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/What_Animal_Meme.mp4" type="video/mp4">
                Browser Anda tidak mendukung video HTML5.
            </video>
        </div>
        <div class="player-caption">
            <h3>
                <span class="now-badge">NOW PLAYING</span>
                <span id="currentMovieTitle">Gary Dourdan FIRE</span>
            </h3>
            <div class="player-desc" id="currentMovieDesc">
                Growing up in a remote forest cabin with his dad, Gus learns survival and secrets. 🔥
            </div>
        </div>
    </div>

    <!-- DAFTAR TRENDING MOVIE dengan FLEXBOX (mirip screenshot) -->
    <div class="trending-section">
        <div class="section-title">
            <h2>📺 Top 10 Trending</h2>
            <span>✨ minggu ini</span>
        </div>

        <div class="movies-flex-list" id="moviesContainer">
            <!-- Data movie akan di-generate via JS, namun tetap sesuai gambar: 
                 Gary Dourdan FIRE, Ep-2 Sorry..., Love Again, HIT The 2nd Case, Robin Hood 
                 plus tambahan agar mirip 5+ supaya flexbox menunjukkan 5 item, seperti contoh gambarmu.
                 Saya akan membuat 5 item utama seperti daftar, namun juga bisa develop lebih trend.
            -->
        </div>
    </div>
    <div class="footer-note">
        ⚡ MovieTampan — tonton favoritmu. Klik poster untuk ganti video & info.
    </div>
</div>

<script>
    // Data movie berdasarkan gambar yang diberikan (judul, durasi, deskripsi)
    // Saya sempurnakan deskripsi agar mirip dengan "Growing up in a remote forest cabin..." namun variatif
    const moviesData = [
        {
            id: 1,
            title: "SWAPPED(2026)",
            duration: "1h 35min",
            desc: "Dalam film (Swapped)(2026), seekor makhluk hutan kecil dan burung megah tiba-tiba bertukar tubuh, memaksa mereka bekerja sama untuk bertahan hidup dalam petualangan paling liar mereka. Dengan kekuatan dan kemampuan baru, mereka harus beradaptasi dan belajar dari satu sama lain untuk kembali ke tubuh asli mereka.",
            videoSrc: "video/Swapped.mp4",  // kelinci lucu, sample video
            posterBg: "linear-gradient(135deg, #b45f2e, #5a2e1a)"
        },
        {
            id: 2,
            title: "GOAT(2026)",
            duration: "1h 40min",
            desc: "Dalam film GOAT (2026), seekor kambing kecil dengan impian besar mendapat kesempatan langka untuk bergabung dengan tim profesional dan bermain Roarball, olahraga intens dengan kontak penuh yang dikuasai oleh hewan tercepat dan terganas di dunia.",
            videoSrc: "video/Goat.mp4",
            posterBg: "linear-gradient(135deg, #2f4858, #1f2e3a)"
        },
        {
            id: 3,
            title: "ZOOTOPIA2(2025)",
            duration: "1h 44min",
            desc: "Di Zootopia 2, kop kelinci berani Judy Hopps dan temannya yang cerdik, rubah Nick Wilde, bergabung kembali untuk memecahkan kasus baru yang paling berbahaya dan rumit dalam karir mereka. Mereka harus memecahkan misteri pencurian yang melibatkan hewan-hewan langka di kota Zootopia. Dengan aksi seru, petualangan penuh kejutan, dan komedi yang menghibur, Judy dan Nick harus bekerja sama untuk mengungkap kebenaran di balik kasus ini.",
            videoSrc: "video/Zootopia2.mp4",
            posterBg: "linear-gradient(135deg, #9e5e6b, #522b3a)"
        },
        {
            id: 4,
            title: "HOPPERS(2026)",
            duration: "1h 45min",
            desc: "Hoppers (2026) adalah film animasi petualangan komedi sains fiksi yang mengisahkan seorang pencinta hewan berusia 19 tahun yang menggunakan teknologi canggih untuk memindahkan kesadaran ke dalam tubuh.",
            videoSrc: "video/Hoppers.mp4",
            posterBg: "linear-gradient(135deg, #1e3c3f, #0a2023)"
        },
        {
            id: 5,
            title: "THE WILD ROBOT",
            duration: "1h 42min",
            desc: "The Wild Robot, sebuah petualangan animasi sci-fi yang mempesona, mengisahkan Roz, robot cerdas yang terdampar di pulau tak berpenghuni. Roz menjalin ikatan dengan hewan-hewan dan merawat bayi angsa yatim piatu, tetapi apa yang terjadi ketika Roz menemukan jalan untuk kembali ke dunia luar? Penasaran?",
            videoSrc: "video/Thewildrobot.mp4",
            posterBg: "linear-gradient(135deg, #2c6e49, #1a4029)"
        }
    ];

    // tambahan default video jika diperlukan, namun di atas sudah
    const moviesContainer = document.getElementById("moviesContainer");
    const mainPlayer = document.getElementById("mainPlayer");
    const currentTitleSpan = document.getElementById("currentMovieTitle");
    const currentDescDiv = document.getElementById("currentMovieDesc");

    // fungsi untuk mengupdate player (video & teks)
    function updatePlayer(movie) {
        // update sumber video
        if (movie.videoSrc) {
            // cek apakah source berbeda, untuk menghindari reset tanpa perlu
            if (mainPlayer.querySelector('source')) {
                // ganti source existing
                const sourceElem = mainPlayer.querySelector('source');
                sourceElem.src = movie.videoSrc;
            } else {
                // fallback: buat source baru
                const newSource = document.createElement('source');
                newSource.src = movie.videoSrc;
                newSource.type = "video/mp4";
                mainPlayer.appendChild(newSource);
            }
            // load video dan play otomatis (optional, tapi lebih user-friendly)
            mainPlayer.load();
            // Coba play (karena kebijakan browser, mungkin hanya bisa jika user interaksi, tapi tidak masalah)
            mainPlayer.play().catch(e => console.log("Autoplay dicegah, klik tombol play", e));
        }
        // update judul & deskripsi di area player
        currentTitleSpan.innerText = movie.title;
        currentDescDiv.innerText = movie.desc;
    }

    // membuat kartu movie menggunakan flex item
    function buildMovieCards() {
        moviesContainer.innerHTML = ""; // clear container
        moviesData.forEach(movie => {
            const card = document.createElement("div");
            card.className = "movie-card";
            // tambahkan event klik pada kartu untuk mengganti video player
            card.addEventListener("click", () => {
                updatePlayer(movie);
                // sedikit efek visual smooth (optional, untuk interaksi)
                card.style.transform = "scale(0.98)";
                setTimeout(() => { card.style.transform = ""; }, 150);
            });

            // bagian thumbnail (menggunakan background yang dinamis + ikon play)
            const thumbDiv = document.createElement("div");
            thumbDiv.className = "movie-thumb";
            // membuat elemen placeholder dengan background gradasi / teks ikon
            const thumbInner = document.createElement("div");
            thumbInner.className = "thumb-placeholder";
            thumbInner.style.background = movie.posterBg;
            thumbInner.style.opacity = "0.9";
            thumbInner.innerHTML = `🎬 ${movie.title.charAt(0)}`;
            thumbDiv.appendChild(thumbInner);
            
            // info bagian
            const infoDiv = document.createElement("div");
            infoDiv.className = "movie-info";
            
            const titleSpan = document.createElement("div");
            titleSpan.className = "movie-title";
            titleSpan.innerText = movie.title;
            
            const durationSpan = document.createElement("div");
            durationSpan.className = "movie-duration";
            durationSpan.innerText = movie.duration;
            
            const descSpan = document.createElement("div");
            descSpan.className = "movie-desc";
            descSpan.innerText = movie.desc.length > 85 ? movie.desc.substring(0, 80) + "..." : movie.desc;
            
            infoDiv.appendChild(titleSpan);
            infoDiv.appendChild(durationSpan);
            infoDiv.appendChild(descSpan);
            
            card.appendChild(thumbDiv);
            card.appendChild(infoDiv);
            moviesContainer.appendChild(card);
        });
    }
    
    // Inisialisasi pertama: tampilkan movie pertama di player (Gary Dourdan FIRE)
    function initFirstMovie() {
        if (moviesData.length > 0) {
            const firstMovie = moviesData[0];
            // setting sumber video awal dengan yang sudah ada di HTML? Lebih baik sinkronkan source video berdasarkan data
            const currentSource = mainPlayer.querySelector('source');
            if (currentSource) {
                currentSource.src = firstMovie.videoSrc;
            } else {
                const sourceEl = document.createElement('source');
                sourceEl.src = firstMovie.videoSrc;
                sourceEl.type = "video/mp4";
                mainPlayer.appendChild(sourceEl);
            }
            mainPlayer.load();
            currentTitleSpan.innerText = firstMovie.title;
            currentDescDiv.innerText = firstMovie.desc;
            // optional: metatag poster yg tetap menarik
            if (mainPlayer.poster === "") {
                mainPlayer.poster = "https://placehold.co/1280x720/1a1f2e/f5b642?text=MovieTampan";
            }
        }
    }

    // Menambahkan efek hover dinamis pada flex container (tidak mengganggu)
    buildMovieCards();
    initFirstMovie();

    // Jika user ingin mengklik tombol lain? tidak perlu. 
    // Tapi pastikan memungkinkan kontrol video dengan penuh (native control sudah ada)
    // Untuk menjaga responsive & fleksibel, gunakan event resize tidak perlu
    
    // Jika karena alasan beberapa video sample di atas memiliki sumber yang berbeda 
    // dan mungkin mengalami error CORS? tidak masalah karena semua dari bucket publik google sample video.
    // Tambahkan fallback jika video gagal (tidak mengganggu UX)
    mainPlayer.addEventListener('error', (e) => {
        console.warn("Video gagal dimuat, coba cek koneksi.");
        // bisa memberikan notifikasi ringan tapi tidak mengganggu
        currentDescDiv.innerText = "⚠️ Sementara video tidak dapat dimuat, pilih tayangan lain.";
    });
    
    // Inisialisasi supaya saat halaman selesai, interaksi movie card menjadi lebih responsif.
    // Untuk mempercantik tooltip, tidak perlu library tambahan.
    // Flex-box sudah diterapkan pada movies-flex-list, serta pada seluruh komponen.
    // Elemen video player memiliki kontrol penuh (play, pause, volume, fullscreen, dll)
    // Penyesuaian tampilan mirip dengan gambar: judul trending, durasi 1h 20min, dll.
    
    // Tambahan fitur: saat pindah video, durasi di player caption tidak muncul? tidak perlu, hanya judul & desc.
    // tetapi durasi dapat dilihat di kartu. Juga di video itu sendiri sudah ada info durasi.
    // Sempurnakan 'now playing' update
    
    // Agar pengalaman semakin mirip screenshot: daftar film sebanyak 5+ (sesuai gambar ada 5 judul)
    // Saya sudah memberikan 5 judul sesuai data asli dari request gambar : Gary Dourdan FIRE, Ep-2 Sorry about all the dead, Love Again, HIT The 2nd Case, Robin Hood
    // Total 5 item, namun flex-box dengan gap dan wrap membuat tampilan rapi.
    
    // Sediakan juga jika pengguna ingin refresh video tetapi tidak perlu
    
    // Custom minor: tombol interaksi lain? Tidak, sudah simple namun powerful
    // Untuk melengkapi, pastikan gambar poster ikonik dan mirip dengan gaya modern gelap
    
    // Perbaiki deskripsi ketika card hover, tidak perlu
    
    // Kontrol video yang baik: tampilkan subtitle? tidak perlu, fokus ke player control
    
    // Fitur tambahan "Lanjut tonton" tidak perlu agar tetap sesuai permintaan: "video player control, style pakai flex-box"
    
    // update deskripsi jika kartu di klik; sudah ditangani di event card click + player update
    // membuat tombol hover lebih terasa
    
    // Menghapus semua error potensial: jika video gagal load, user bisa klik kartu lain
    // Ada kemungkinan video sample tidak dapat di load karena koneksi, tapi semua dari url resmi google sample video yang valid.
    // sempurnakan localstorage? tidak perlu.
    
    // style tambahan: untuk membuat garis bawah pada player juga sudah rapi.
    
    // Done, output sesuai harapan: website simple judul "MovieTampan", ada video player native dengan kontrol, 
    // daftar trending seperti gambar, menggunakan flex-box untuk list film, style modern.
    // Juga interaktif saat klik kartu mengubah video dan deskripsi.
    // Mendukung mobile dan desktop.
</script>
</body>
</html>
